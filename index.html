<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢業禮心意牆</title>
    <style>
        :root {
            --bg-color: #eef2f3;
            --memo-yellow: #fff9a0;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; overflow: hidden; background: var(--bg-color); }
        
        /* 導覽切換 (僅供測試用) */
      /* --  .nav-debug { position: fixed; bottom: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; }
        .nav-debug button { cursor: pointer; padding: 6px 12px; margin: 2px; border: none; border-radius: 4px; background: white; font-weight: bold; }
         --*/
/* --- 修正後：平時隱藏、Mouse Over 才浮現的控制列 --- */
        .nav-debug { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            z-index: 9999; 
            background: rgba(0, 0, 0, 0.1); /* 平時極淡色 */
            padding: 10px; 
            border-top-right-radius: 8px; 
            
            /* 核心特效：平時拉低 45px，並且變透明 */
            transform: translateY(45px); 
            opacity: 0.1; 
            
            /* 讓浮現動作有 0.3 秒的順滑動畫效果 */
            transition: transform 0.3s ease, opacity 0.3s ease, background 0.3s ease; 
        }

        /* 當 Mouse 移上去 (Hover) 或者用手指觸摸時，原形畢露 */
        .nav-debug:hover { 
            transform: translateY(0); 
            opacity: 1; 
            background: rgba(0, 0, 0, 0.8); /* 變深色方便看清 */
        }

        .nav-debug button { 
            cursor: pointer; 
            padding: 8px 14px; 
            margin: 2px; 
            border: none; 
            border-radius: 6px; 
            background: white; 
            font-weight: bold; 
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* 稍微提示老師滑鼠要移去邊度 */
        .nav-debug::before {
            content: "◢ 導航選單 (滑鼠移至此處)";
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
        .active { display: block; }

        /* --- 1. 輸入端樣式 --- */

/* --- 1. 修正後的手機專用輸入端樣式 --- */
        #input-page { 
            background: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* 頂部對齊，防止手機鍵盤彈出時遮擋內容 */
            padding: 30px 20px; 
            box-sizing: border-box;
            overflow-y: auto; /* 允許垂直滾動，適合矮屏幕手機 */
        }

        #input-page h2 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 5px;
            margin-top: 10px;
        }

        #input-page p {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .input-box { 
            width: 100%; 
            max-width: 450px; /* 電腦版最大寬度 */
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* 放大輸入框，設定 16px 防止 iOS Safari 自動放大網頁 */
        #senderName, #messageText { 
            width: 100%;
            padding: 14px 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        /* 輸入框點擊時的高亮效果 */
        #senderName:focus, #messageText:focus {
            border-color: #3498db;
        }

        /* 固定 Textarea 的高度，並防止高度超出手機螢幕 */
        #messageText {
            resize: none;
            min-height: 120px;
        }

        /* 大按鈕設計，方便手指盲撳 */
        .send-btn { 
            width: 100%;
            padding: 16px; 
            background: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(44, 62, 80, 0.2);
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊時的藍色高亮陰影 */
        }

        .send-btn:active {
            background: #1a252f;
            transform: scale(0.98); /* 撳落去有微微縮小的按鈕反饋感 */
        }

        /* --- 2. 大屏幕展示端樣式 --- */
        #display-page { background: #eef2f3 url('https://www.transparenttextures.com/patterns/white-wall.png'); }
        .wall-title { position: absolute; width: 100%; text-align: center; top: 20px; font-size: 2.5rem; color: #34495e; z-index: 10; font-weight: bold; }
        
        .memo {
            position: absolute;
            width: 180px;
            min-height: 180px;
            padding: 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* 將動畫換成 memoFadeUp，時間拉長到 2.0秒，慢入慢出 */
            animation: memoFadeUp 2.0s ease-in-out forwards;
            
            /* 預設透明度為 0 (隱藏)，等待動畫執行 */
            opacity: 0;
            
         /*   animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;    */
            word-wrap: break-word;
            border-bottom-right-radius: 40px 10px;
        }
        .memo p { margin: 0; font-size: 1.1rem; line-height: 1.4; color: #333; }
        .memo span { text-align: right; font-size: 0.85rem; color: #666; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 5px; }



        @keyframes memoFadeUp {
            0% { 
                /* 起始狀態：完全透明，且位置向下飄移 20px */
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            30% {
                /* 快速浮現出一些形狀 */
                opacity: 0.3;
            }
            100% { 
                /* 最終狀態：完全顯示，位置回到原點，並且帶有我們之前設定的隨機旋轉 */
                opacity: 1; 
                transform: translateY(0) scale(1) rotate(var(--random-rot)); /* 我們稍後會修改 JS 傳遞旋轉值 */
            }
        }

        

        /* --- 3. 管理員審核樣式 --- */
        #admin-page { padding: 40px 20px; overflow-y: auto; background: #fff; box-sizing: border-box; }
        .admin-item { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; background: #f9f9f9; }
        .approve-btn { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    </style>

        // ========================================================
        // 📺 大屏幕專用：實時監聽（免 Refresh、一秒同步關鍵）
        // ========================================================

        // 1. 建立一個陣列，用嚟記住目前貼喺牆上嘅 Memo 資料與順序
        const placedMemos = []; 

        // 大屏幕：當有新留言被批准時，生成 Memo 紙貼上牆
        onChildAdded(ref(db, 'approved'), (snapshot) => {
            const data = snapshot.val();
            const id = snapshot.key;

            // 如果已經存在同 ID 的 Memo，就不重複生成（防止老師開多個分頁時衝突）
            if (document.getElementById(`memo-wall-${id}`)) return;

            // ------------------------------------------------------------
            // 🛠️ 核心功能擴充：當螢幕超過 20 張時，自動拔走最舊嗰張
            // ------------------------------------------------------------
            if (placedMemos.length >= 20) {
                // 攞出最舊（最頂/最早貼上）嗰張 Memo 的資料
                const oldestMemoData = placedMemos.shift(); 
                const oldestDom = document.getElementById(`memo-wall-${oldestMemoData.id}`);
                
                if (oldestDom) {
                    // 播動畫：0.5秒內即時縮小並透明消失
                    oldestDom.style.transition = "all 0.5s ease";
                    oldestDom.style.opacity = "0";
                    oldestDom.style.transform = "scale(0)";
                    // 動畫播完後從 HTML 網頁中徹底移除
                    setTimeout(() => oldestDom.remove(), 500);
                }
            }
            // ------------------------------------------------------------

            const memo = document.createElement('div');
            memo.className = 'memo';
            memo.id = `memo-wall-${id}`; 
            memo.style.backgroundColor = data.color;
            
            // --- 15% 重疊度限制與防撞算法 ---
            const MEMO_WIDTH = 220;  
            const MEMO_HEIGHT = 220; 
            const MAX_OVERLAP_FACTOR = 0.15; 
            
            let x = 0, y = 0;
            let attempts = 0;
            let foundSafeSpot = false;

            while (!foundSafeSpot && attempts < 200) {
                attempts++;
                
                const GRID_WIDTH = 240;  
                const GRID_HEIGHT = 240; 
                const cols = Math.floor(window.innerWidth / GRID_WIDTH);
                const rows = Math.floor((window.innerHeight - 120) / GRID_HEIGHT);
                const totalSlots = Math.max(1, cols * rows);
                
                const randomSlot = Math.floor(Math.random() * totalSlots);
                const colIndex = randomSlot % cols;
                const rowIndex = Math.floor(randomSlot / cols);
                
                x = colIndex * GRID_WIDTH + 20 + (Math.random() - 0.5) * 60;
                y = rowIndex * GRID_HEIGHT + 120 + (Math.random() - 0.5) * 60;

                if (x + MEMO_WIDTH > window.innerWidth) x = window.innerWidth - MEMO_WIDTH - 20;
                if (y + MEMO_HEIGHT > window.innerHeight) y = window.innerHeight - MEMO_HEIGHT - 20;
                if (x < 10) x = 10;
                if (y < 120) y = 120;

                let hasCollision = false;
                for (const existing of placedMemos) {
                    const xOverlap = Math.max(0, Math.min(x + MEMO_WIDTH, existing.x + MEMO_WIDTH) - Math.max(x, existing.x));
                    const yOverlap = Math.max(0, Math.min(y + MEMO_HEIGHT, existing.y + MEMO_HEIGHT) - Math.max(y, existing.y));
                    
                    if (xOverlap > 0 && yOverlap > 0) {
                        const overlapArea = xOverlap * yOverlap;
                        const memoArea = MEMO_WIDTH * MEMO_HEIGHT;
                        
                        if (overlapArea / memoArea > MAX_OVERLAP_FACTOR) {
                            hasCollision = true;
                            break; 
                        }
                    }
                }

                if (!hasCollision) {
                    foundSafeSpot = true;
                }
            }

            // 將新貼上嘅 Memo 資料（連同坐標）推入陣列最尾
            placedMemos.push({ id: id, x: x, y: y });

            const rot = (Math.random() - 0.5) * 15;
            memo.style.setProperty('--random-rot', `${rot}deg`);
            memo.style.left = `${x}px`;
            memo.style.top = `${y}px`;
            
            memo.innerHTML = `<p>${data.text}</p><span>— ${data.name}</span>`;
            document.getElementById('wall-container').appendChild(memo);
        });




    


    
        // 核心修正：當任何地方執行了「下架」，Firebase 通知大屏幕即時拔走 Memo 紙！
        onChildRemoved(ref(db, 'approved'), (snapshot) => {
            const id = snapshot.key;
            
            // 1. 大屏幕同步更新：找到張 Memo，播動畫，0.5秒內即時拔走消失！
            const targetMemo = document.getElementById(`memo-wall-${id}`);
            if (targetMemo) {
                targetMemo.style.transition = "all 0.5s ease";
                targetMemo.style.opacity = "0";
                targetMemo.style.transform = "scale(0)";
                setTimeout(() => targetMemo.remove(), 500); 
            }

            // 2. 老師控制台同步更新：從現正顯示清單中清走
            const targetLiveItem = document.getElementById(`admin-approved-${id}`);
            if (targetLiveItem) {
                targetLiveItem.remove();
            }

            // new add  3. 同步從坐標陣列中拔除，釋放空間讓後續的 Memo 可以貼在這個位置
            const index = placedMemos.findIndex(m => m.id === id);
            if (index !== -1) placedMemos.splice(index, 1);

            // 老師控制台手動下架時，也要同步清除陣列紀錄
  //          const index = placedMemos.findIndex(m => m.id === id);
  //          if (index !== -1) placedMemos.splice(index, 1);

            
        });
  
// ========================================================
        // 🔒 安全防護：禁用右鍵、F12 及開發者工具快捷鍵
        // ========================================================
        
        // 1. 禁用滑鼠右鍵
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            alert("Disabled");
        });

        // 2. 禁用鍵盤 F12, Ctrl+Shift+I (Windows), Cmd+Alt+I (Mac) 等開發者工具快捷鍵
        document.addEventListener('keydown', (e) => {
            // F12 鍵
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Ctrl + Shift + I 或 Cmd + Alt + I (打開檢查)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'i') {
                e.preventDefault();
                return false;
            }
            // Ctrl + Shift + J (打開 Console)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'j') {
                e.preventDefault();
                return false;
            }
            // Ctrl + U (直接觀看網頁原始碼)
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u') {
                e.preventDefault();
                return false;
            }
        });



</script>

</body>
</html>
