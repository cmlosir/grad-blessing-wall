<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢業禮心意牆</title>
    <style>
        :root {
            --bg-color: #eef2f3;
            --memo-yellow: #fff9a0;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; overflow: hidden; background: var(--bg-color); }
        
        /* 導覽切換 (僅供測試用) */
        .nav-debug { position: fixed; bottom: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; }
        .nav-debug button { cursor: pointer; padding: 6px 12px; margin: 2px; border: none; border-radius: 4px; background: white; font-weight: bold; }

        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
        .active { display: block; }

        /* --- 1. 輸入端樣式 --- */

/* --- 1. 修正後的手機專用輸入端樣式 --- */
        #input-page { 
            background: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* 頂部對齊，防止手機鍵盤彈出時遮擋內容 */
            padding: 30px 20px; 
            box-sizing: border-box;
            overflow-y: auto; /* 允許垂直滾動，適合矮屏幕手機 */
        }

        #input-page h2 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 5px;
            margin-top: 10px;
        }

        #input-page p {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .input-box { 
            width: 100%; 
            max-width: 450px; /* 電腦版最大寬度 */
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* 放大輸入框，設定 16px 防止 iOS Safari 自動放大網頁 */
        #senderName, #messageText { 
            width: 100%;
            padding: 14px 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        /* 輸入框點擊時的高亮效果 */
        #senderName:focus, #messageText:focus {
            border-color: #3498db;
        }

        /* 固定 Textarea 的高度，並防止高度超出手機螢幕 */
        #messageText {
            resize: none;
            min-height: 120px;
        }

        /* 大按鈕設計，方便手指盲撳 */
        .send-btn { 
            width: 100%;
            padding: 16px; 
            background: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(44, 62, 80, 0.2);
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊時的藍色高亮陰影 */
        }

        .send-btn:active {
            background: #1a252f;
            transform: scale(0.98); /* 撳落去有微微縮小的按鈕反饋感 */
        }

        /* --- 2. 大屏幕展示端樣式 --- */
        #display-page { background: #eef2f3 url('https://www.transparenttextures.com/patterns/white-wall.png'); }
        .wall-title { position: absolute; width: 100%; text-align: center; top: 20px; font-size: 2.5rem; color: #34495e; z-index: 10; font-weight: bold; }
        
        .memo {
            position: absolute;
            width: 180px;
            min-height: 180px;
            padding: 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* 將動畫換成 memoFadeUp，時間拉長到 1.5秒，慢入慢出 */
            animation: memoFadeUp 1.5s ease-in-out forwards;
            
            /* 預設透明度為 0 (隱藏)，等待動畫執行 */
            opacity: 0;
            
         /*   animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;    */
            word-wrap: break-word;
            border-bottom-right-radius: 40px 10px;
        }
        .memo p { margin: 0; font-size: 1.1rem; line-height: 1.4; color: #333; }
        .memo span { text-align: right; font-size: 0.85rem; color: #666; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 5px; }

        /* ---       @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { opacity: 1; }
        }   --- */

        @keyframes memoFadeUp {
            0% { 
                /* 起始狀態：完全透明，且位置向下飄移 20px */
                opacity: 0; 
                transform: translateY(20px) scale(0.95); 
            }
            30% {
                /* 快速浮現出一些形狀 */
                opacity: 0.3;
            }
            100% { 
                /* 最終狀態：完全顯示，位置回到原點，並且帶有我們之前設定的隨機旋轉 */
                opacity: 1; 
                transform: translateY(0) scale(1) rotate(var(--random-rot)); /* 我們稍後會修改 JS 傳遞旋轉值 */
            }
        }

        

        /* --- 3. 管理員審核樣式 --- */
        #admin-page { padding: 40px 20px; overflow-y: auto; background: #fff; box-sizing: border-box; }
        .admin-item { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; background: #f9f9f9; }
        .approve-btn { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="nav-debug">
        <button id="btn-goto-input">學生/家長輸入</button>
        <button id="btn-goto-admin">老師審核</button>
        <button id="btn-goto-display">大屏幕展示</button>
    </div>

    <div id="input-page" class="page active">
        <h2>🎓 畢業禮心意牆</h2>
        <p>為畢業同學送上祝福</p>
        <div class="input-box">
            <input type="text" id="senderName" placeholder="你的名字 / 班別" maxlength="15">
            <textarea id="messageText" rows="4" placeholder="祝福說話 (限50字)..." maxlength="50"></textarea>
            <button class="send-btn" id="btn-submit">送出心意</button>
        </div>
    </div>

    <div id="display-page" class="page">
        <div class="wall-title">2026 畢業典禮：祝福牆</div>
        <div id="wall-container"></div>
    </div>

<div id="admin-page" class="page" style="padding: 40px 20px; overflow-y: auto; background: #fff; box-sizing: border-box;">
        <h2>📋 老師審核控制台 (密碼驗證成功)</h2>
        <hr>
        
        <h3 style="color: #e67e22; margin-top: 20px;">⏳ 待審核心意 (Pending)</h3>
        <div id="admin-list"></div>
        
        <br><hr><br>
        
        <h3 style="color: #27ae60;">📺 大屏幕現正顯示 (Live)</h3>
        <div id="admin-approved-list"></div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // ========================================================
        // !!! 重要：請在這裡填寫你自己的真實 Firebase Config !!!
        // ========================================================
        const firebaseConfig = {
             apiKey: "AIzaSyDsKFoGPd8RapCdMVevU3ml5LfJ0JXuq6w",
              authDomain: "grad-message.firebaseapp.com",
              databaseURL: "https://grad-message-default-rtdb.firebaseio.com/",
              projectId: "grad-message",
              storageBucket: "grad-message.firebasestorage.app",
              messagingSenderId: "683173524712",
              appId: "1:683173524712:web:7a9e2479381f80e689c55d",
              measurementId: "G-7FMV2SFQJ9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const colors = ['#fff9a0', '#ffc2e2', '#a2e1ff', '#b4f0a7', '#ffd3a2'];
        const ADMIN_PASSWORD = "ydss"; 

        // --- 修正後的安全頁面切換功能 ---
        function executePageChange(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const targetPage = document.getElementById(id);
            if (targetPage) {
                targetPage.classList.add('active');
            }
        }

        // 綁定導航按鈕點擊事件，避免 HTML 找不到 function
        document.getElementById('btn-goto-input').addEventListener('click', () => executePageChange('input-page'));
        document.getElementById('btn-goto-display').addEventListener('click', () => executePageChange('display-page'));
        
        document.getElementById('btn-goto-admin').addEventListener('click', () => {
            const password = prompt("請輸入管理員密碼：");
            if (password === ADMIN_PASSWORD) {
                executePageChange('admin-page');
            } else {
                alert("密碼錯誤，拒絕存取！");
            }
        });

        // --- 功能：輸入端送出 ---
        document.getElementById('btn-submit').addEventListener('click', () => {
            const name = document.getElementById('senderName').value || "有心人";
            const text = document.getElementById('messageText').value;
            if(!text) return alert("請輸入內容");

            push(ref(db, 'pending'), {
                name: name,
                text: text,
                color: colors[Math.floor(Math.random() * colors.length)],
                time: Date.now()
            }).then(() => {
                alert("已送出，等待老師審核後顯示！");
                document.getElementById('messageText').value = "";
            });
        });

        // --- 功能：管理員監聽 pending 並動態生成審核列表 ---
      
// --- 功能：管理員監聽 pending 並動態生成審核列表 ---
        onChildAdded(ref(db, 'pending'), (snapshot) => {
            const data = snapshot.val();
            const id = snapshot.key;
            
            const item = document.createElement('div');
            item.className = 'admin-item';
            item.id = `admin-pending-${id}`; // 加上 pending 標記
            
            const textDiv = document.createElement('div');
            textDiv.innerHTML = `<strong>${data.name}:</strong> ${data.text}`;
            
            const btnGroup = document.createElement('div');
            btnGroup.style.display = 'flex';
            btnGroup.style.gap = '10px';

            // 批准按鈕
            const approveBtn = document.createElement('button');
            approveBtn.className = 'approve-btn';
            approveBtn.innerText = '批准';
            approveBtn.onclick = () => {
                // 將資料搬去 approved，並附帶原本嘅時間印記，確保留言次序不變
                push(ref(db, 'approved'), data); 
                remove(ref(db, `pending/${id}`)); 
                item.remove();
            };
            
            // 拒絕按鈕
            const rejectBtn = document.createElement('button');
            rejectBtn.innerText = '拒絕';
            rejectBtn.style.background = '#e74c3c';
            rejectBtn.style.color = 'white';
            rejectBtn.style.padding = '10px 20px';
            rejectBtn.style.border = 'none';
            rejectBtn.style.borderRadius = '5px';
            rejectBtn.style.cursor = 'pointer';
            
            rejectBtn.onclick = () => {
                if(confirm(`確定要拒絕並刪除這條留言嗎？\n"${data.text}"`)) {
                    remove(ref(db, `pending/${id}`));
                    item.remove();
                }
            };
            
            btnGroup.appendChild(approveBtn);
            btnGroup.appendChild(rejectBtn);
            item.appendChild(textDiv);
            item.appendChild(btnGroup);
            document.getElementById('admin-list').appendChild(item);
        });

        // --- 功能：管理員同時監聽 approved，生成「隨時下架」清單 ---
        onChildAdded(ref(db, 'approved'), (snapshot) => {
            const data = snapshot.val();
            const id = snapshot.key;

            // 1. 在老師的「大屏幕現正顯示」列表中加一列
            const liveItem = document.createElement('div');
            liveItem.className = 'admin-item';
            liveItem.id = `admin-approved-${id}`; // 用 approved ID 標記
            liveItem.style.borderLeft = "5px solid #27ae60"; // 加條綠邊容易睇

            const textDiv = document.createElement('div');
            textDiv.innerHTML = `<strong>${data.name}:</strong> ${data.text}`;

            const removeBtn = document.createElement('button');
            removeBtn.innerText = '⚠️ 即時下架';
            removeBtn.style.background = '#c0392b';
            removeBtn.style.color = 'white';
            removeBtn.style.padding = '10px 15px';
            removeBtn.style.border = 'none';
            removeBtn.style.borderRadius = '5px';
            removeBtn.style.cursor = 'pointer';

            removeBtn.onclick = () => {
                if(confirm(`防手殘安全確認：\n確定要將 "${data.name}" 的留言從大屏幕【即時下架】並永久刪除嗎？`)) {
                    remove(ref(db, `approved/${id}`)); // 從 Firebase 的 approved 刪除數據
                    // 備註：大屏幕會收到下面的 remove 監聽，自動將 Memo 蒸發，這裡不用手動 delete 畫面
                }
            };

            liveItem.appendChild(textDiv);
            liveItem.appendChild(removeBtn);
            document.getElementById('admin-approved-list').appendChild(liveItem);

            // 2. 【大屏幕同步顯示】當有新 approved，在展示端生成 Memo 紙
            const memo = document.createElement('div');
            memo.className = 'memo';
            memo.id = `memo-wall-${id}`; // 為大屏幕的 Memo 紙綁定一個獨一無二的 ID
            memo.style.backgroundColor = data.color;
            
            // (保留原本的網格防重疊和隨機旋轉計算)
            const GRID_WIDTH = 240;  
            const GRID_HEIGHT = 240; 
            const cols = Math.floor(window.innerWidth / GRID_WIDTH);
            const rows = Math.floor((window.innerHeight - 120) / GRID_HEIGHT);
            const totalSlots = cols * rows;
            
            // 隨機生成位置（使用你原本的網格防重疊代碼）
            const randomSlot = Math.floor(Math.random() * totalSlots);
            const colIndex = randomSlot % cols;
            const rowIndex = Math.floor(randomSlot / cols);
            const rot = (Math.random() - 0.5) * 15;
            const x = colIndex * GRID_WIDTH + 20 + (Math.random() - 0.5) * 60;
            const y = rowIndex * GRID_HEIGHT + 120 + (Math.random() - 0.5) * 60;

            memo.style.setProperty('--random-rot', `${rot}deg`);
            memo.style.left = `${x}px`;
            memo.style.top = `${y}px`;
            
            memo.innerHTML = `<p>${data.text}</p><span>— ${data.name}</span>`;
            document.getElementById('wall-container').appendChild(memo);
        });

        // --- 【核心防手殘機制】監聽 Firebase 的刪除動作 ---
        // 當老師喺後台撳「即時下架」，Firebase 刪除數據時，呢個監聽會命令大屏幕同埋老師後台一秒內同步清走個樣嘢！
        import { onChildRemoved } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        
        onChildRemoved(ref(db, 'approved'), (snapshot) => {
            const id = snapshot.key;
            
            // 1. 讓大屏幕上對應的 Memo 紙瞬間蒸發
            const targetMemo = document.getElementById(`memo-wall-${id}`);
            if (targetMemo) {
                targetMemo.style.transition = "all 0.5s ease";
                targetMemo.style.opacity = "0";
                targetMemo.style.transform = "scale(0)";
                setTimeout(() => targetMemo.remove(), 500); // 動畫播完後徹底移除
            }

            // 2. 讓老師後台「大屏幕現正顯示」列表中的該列同步移除
            const targetLiveItem = document.getElementById(`admin-approved-${id}`);
            if (targetLiveItem) {
                targetLiveItem.remove();
            }
        });
        


        // --- 功能：展示端監聽 approved 並顯示在牆上 ---

// --- 功能：展示端監聽 approved 並顯示在牆上 (網格防重疊優化版) ---
        
        // 1. 定義網格參數 (根據 Memo 紙大小 180px + 20px padding 算)
        const GRID_WIDTH = 240;  
        const GRID_HEIGHT = 240; 
        let occupiedSlots = []; // 用來紀錄邊些位置已經被佔用

        onChildAdded(ref(db, 'approved'), (snapshot) => {
            const data = snapshot.val();
            const memo = document.createElement('div');
            memo.className = 'memo';
            memo.style.backgroundColor = data.color;
            
            // 2. 計算目前大屏幕可以容納幾多行同幾多列
            const cols = Math.floor(window.innerWidth / GRID_WIDTH);
            const rows = Math.floor((window.innerHeight - 120) / GRID_HEIGHT); // 減去頂部標題空間
            const totalSlots = cols * rows;

            // 3. 搵出未被佔用嘅空位 (Slots)
            let availableSlots = [];
            for (let i = 0; i < totalSlots; i++) {
                if (!occupiedSlots.includes(i)) {
                    availableSlots.push(i);
                }
            }

            // 4. 如果牆上貼滿咗，就清空最舊嘅紀錄，重新填滿
            if (availableSlots.length === 0) {
                occupiedSlots = []; 
                document.getElementById('wall-container').innerHTML = ''; // 清空大屏幕
                for (let i = 0; i < totalSlots; i++) availableSlots.push(i);
            }

            // 5. 隨機揀一個空嘅格子放進去
            const randomSlotIndex = Math.floor(Math.random() * availableSlots.length);
            const chosenSlot = availableSlots[randomSlotIndex];
            occupiedSlots.push(chosenSlot); // 標記呢個位置已經有人用

            // 6. 將格子編號轉回 X 和 Y 座標
            const colIndex = chosenSlot % cols;
            const rowIndex = Math.floor(chosenSlot / cols);

            // 7. 加上少許微調 (Offset)，容許最多 1/4 的重疊，令畫面看起來更自然、不呆板
            const maxOverlapX = GRID_WIDTH * 0.25;  // 最多重疊 1/4
            const maxOverlapY = GRID_HEIGHT * 0.25; 
            
            const offsetX = (Math.random() - 0.5) * maxOverlapX;
            const offsetY = (Math.random() - 0.5) * maxOverlapY;

            const x = colIndex * GRID_WIDTH + 20 + offsetX;
            const y = rowIndex * GRID_HEIGHT + 120 + offsetY; // 120 是避開標題
            const rot = (Math.random() - 0.5) * 15; // 隨機輕微旋轉


            // 8. 套用樣式與內容 (修正以配合慢慢浮現動畫)
            
            // 將原本隨機計算出的旋轉角度，儲存為一個 CSS 變數 (--random-rot)，讓 CSS 動畫讀取
            memo.style.setProperty('--random-rot', `${rot}deg`);
            
            // 只設定 left 和 top (不設定 transform，由動畫去設定)
            memo.style.left = `${x}px`;
            memo.style.top = `${y}px`;
            
            memo.innerHTML = `<p>${data.text}</p><span>— ${data.name}</span>`;
            document.getElementById('wall-container').appendChild(memo);





            
            // 8. 套用樣式與內容
     /*--       memo.style.left = `${x}px`;
            memo.style.top = `${y}px`;
            memo.style.transform = `rotate(${rot}deg)`;
            
            memo.innerHTML = `<p>${data.text}</p><span>— ${data.name}</span>`;
            document.getElementById('wall-container').appendChild(memo);
        --*/
            
            // 限制畫面的總數目，維持大屏幕順暢
            if(document.querySelectorAll('.memo').length > totalSlots) {
                document.querySelector('.memo').remove();
            }
      
        });
    </script>
</body>
</html>
